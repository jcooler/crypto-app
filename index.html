<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>QuantumVista — Live crypto markets</title>
    <meta
      name="description"
      content="Live cryptocurrency prices, market data, charts, and news. Track the top coins with real-time updates."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0f" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f6f9" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuantumVista" />
    <meta property="og:title" content="QuantumVista — Live crypto markets" />
    <meta
      property="og:description"
      content="Live cryptocurrency prices, market data, charts, and news."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuantumVista — Live crypto markets" />
    <meta
      name="twitter:description"
      content="Live cryptocurrency prices, market data, charts, and news."
    />
    <meta name="twitter:image" content="/og.png" />
    <script>
      // set theme before first paint: stored choice wins, then OS preference,
      // then dark (the default)
      (function () {
        try {
          var stored = localStorage.getItem("qv-theme");
          var dark = stored
            ? stored === "dark"
            : !window.matchMedia("(prefers-color-scheme: light)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          /* keep dark default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
